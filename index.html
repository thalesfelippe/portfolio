<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Thales Felippe, Full Stack Developer building reliable web products, APIs, integrations, dashboards, and operational systems."
    />
    <link rel="canonical" href="https://thalesdevflp.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://thalesdevflp.com/" />
    <meta property="og:title" content="Thales Felippe | Full Stack Developer" />
    <meta
      property="og:description"
      content="Full Stack Developer focused on reliable web products, APIs, integrations, dashboards, and operational systems."
    />
    <meta property="og:site_name" content="Thales Felippe Portfolio" />
    <meta property="og:image" content="https://thalesdevflp.com/favicon.svg" />
    <meta name="theme-color" content="#0B1020" />
    <script>
      try {
        const savedTheme = window.localStorage.getItem('portfolio-theme')
        const systemPrefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches
        const theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : systemPrefersDark
              ? 'dark'
              : 'light'

        document.documentElement.classList.toggle('dark', theme === 'dark')
        document.documentElement.dataset.theme = theme
      } catch {
        document.documentElement.dataset.theme = 'light'
      }
    </script>
    <title>Thales Felippe | Full Stack Developer Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
